<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>조현 비서실</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#f7f4ee; --card:#fffdf9; --ink:#1d2722; --sub:#5c655f;
    --green:#1c5c4a; --gold:#b8975a; --red:#bd4630; --amber:#c98a23; --slate:#737b76;
    --line:#e6e0d4; --line2:#efe9dd;
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{background:var(--paper);color:var(--ink);
    font-family:'Noto Sans KR',system-ui,-apple-system,sans-serif;
    -webkit-font-smoothing:antialiased;line-height:1.45}
  .mono{font-family:ui-monospace,'SF Mono',Menlo,Consolas,monospace}
  .wrap{max-width:660px;margin:0 auto;padding:0 14px 64px}
  .top{position:sticky;top:0;z-index:20;background:var(--paper);
    border-bottom:1px solid var(--line);padding:14px 0 10px;margin-bottom:6px}
  .top .row{display:flex;align-items:baseline;justify-content:space-between;gap:10px}
  .brand{font-weight:900;font-size:21px;letter-spacing:-.5px}
  .brand .dot{color:var(--gold)}
  .date{font-size:12px;color:var(--sub)}
  .statusline{display:flex;align-items:center;gap:8px;margin-top:7px;font-size:11px;color:var(--sub)}
  .pill{display:inline-flex;align-items:center;gap:5px;padding:2px 8px;border-radius:999px;border:1px solid var(--line);background:var(--card)}
  .pill.live{color:var(--green);border-color:#bcd6cc}
  .pill.demo{color:var(--amber);border-color:#ecd9b0}
  .refresh{margin-left:auto;border:1px solid var(--line);background:var(--card);color:var(--ink);border-radius:8px;padding:4px 10px;font-size:11px;font-family:inherit;cursor:pointer}
  .quick{display:flex;gap:7px;margin:10px 0 4px}
  .quick input{flex:1;border:1px solid var(--line);background:var(--card);border-radius:10px;padding:11px 12px;font-size:14px;font-family:inherit;color:var(--ink)}
  .quick input:focus{outline:none;border-color:var(--green)}
  .quick button{border:none;background:var(--green);color:#fff;border-radius:10px;padding:0 15px;font-weight:700;font-size:14px;font-family:inherit;cursor:pointer}
  .prio-toggle{display:flex;gap:6px;margin:0 0 12px}
  .prio-toggle button{flex:1;border:1px solid var(--line);background:var(--card);border-radius:8px;padding:6px 0;font-size:11px;font-family:inherit;color:var(--sub);cursor:pointer}
  .prio-toggle button[data-on="1"]{border-color:var(--ink);color:var(--ink);font-weight:700;background:#fff}
  .chips{display:flex;flex-wrap:wrap;gap:6px;margin:4px 0 16px}
  .chip{border:1px solid var(--line);background:var(--card);border-radius:999px;padding:5px 11px;font-size:12px;color:var(--sub);font-family:inherit;cursor:pointer;white-space:nowrap}
  .chip[data-on="1"]{background:var(--ink);color:#fff;border-color:var(--ink)}
  .chip .n{opacity:.6;margin-left:4px;font-size:11px}
  .sec{margin:22px 0 9px;display:flex;align-items:center;gap:9px}
  .sec h2{margin:0;font-size:13px;font-weight:700;letter-spacing:.3px}
  .sec .cnt{font-size:11px;color:var(--sub);font-weight:500}
  .sec .bar{width:9px;height:9px;border-radius:2px}
  .bar.t{background:var(--red)} .bar.w{background:var(--green)} .bar.a{background:var(--slate)}
  .cal{background:#fffaf0;border:1px solid #ecdfc2;border-radius:12px;padding:11px 13px;margin-bottom:6px}
  .cal h3{margin:0 0 8px;font-size:12px;font-weight:700;color:#8a6a1f;display:flex;gap:7px;align-items:center}
  .cal .it{display:flex;gap:10px;align-items:baseline;padding:5px 0;border-top:1px dashed #ecdfc2}
  .cal .it:first-of-type{border-top:none}
  .cal .d{font-size:12px;font-weight:700;color:var(--ink);min-width:62px}
  .cal .tt{font-size:13px;color:var(--ink)}
  .cal .note{font-size:11px;color:var(--sub);margin-top:7px}
  .card{position:relative;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:12px 13px 11px;margin-bottom:9px;overflow:hidden}
  .card:before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px}
  .card.t:before{background:var(--red)} .card.w:before{background:var(--green)} .card.a:before{background:var(--slate)}
  .ctop{display:flex;align-items:flex-start;gap:8px}
  .ttl{font-weight:700;font-size:15px;flex:1;letter-spacing:-.2px}
  .agent{font-size:10px;color:var(--green);background:#eaf2ee;border:1px solid #cfe3da;border-radius:6px;padding:2px 6px;white-space:nowrap;font-weight:500}
  .na{font-size:12.5px;color:var(--sub);margin-top:6px;line-height:1.5}
  .meta{display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin-top:9px}
  .tag{font-size:10.5px;border-radius:6px;padding:2px 7px;border:1px solid var(--line2);color:var(--sub);background:#faf7f1}
  .tag.due{color:var(--ink);border-color:#e3d8c0;background:#fdf6e8;font-weight:600}
  .tag.own{color:#8a6a1f;border-color:#ecdfc2;background:#fdf6e8}
  .tag.dele{color:var(--green)}
  .src{margin-left:auto;display:inline-flex;align-items:center;gap:5px;font-size:10px;color:#8a6a1f;background:#fff;border:1px solid #ecdfc2;border-radius:6px;padding:2px 7px}
  .src:before{content:"";width:2px;height:11px;background:var(--gold);border-radius:2px}
  .done{border:1px solid var(--green);background:#fff;color:var(--green);border-radius:8px;padding:6px 13px;font-size:12px;font-weight:700;font-family:inherit;cursor:pointer;margin-top:10px}
  .done:active{background:var(--green);color:#fff}
  .editor{margin-top:10px;border-top:1px dashed var(--line);padding-top:10px}
  .editor textarea{width:100%;border:1px solid var(--line);border-radius:9px;padding:9px;font-size:13px;font-family:inherit;color:var(--ink);resize:vertical;min-height:54px}
  .editor textarea:focus{outline:none;border-color:var(--green)}
  .erow{display:flex;gap:7px;margin-top:8px}
  .erow .save{flex:1;border:none;background:var(--green);color:#fff;border-radius:9px;padding:9px;font-weight:700;font-size:13px;font-family:inherit;cursor:pointer}
  .erow .cancel{border:1px solid var(--line);background:#fff;color:var(--sub);border-radius:9px;padding:9px 14px;font-size:13px;font-family:inherit;cursor:pointer}
  .fold{margin-top:26px;border-top:1px solid var(--line);padding-top:6px}
  .fold>button{width:100%;display:flex;align-items:center;gap:9px;background:none;border:none;padding:11px 2px;font-size:14px;font-weight:700;font-family:inherit;color:var(--ink);cursor:pointer}
  .fold>button .cnt{font-size:11px;color:var(--sub);font-weight:500}
  .fold>button .arr{margin-left:auto;color:var(--sub);font-size:12px}
  .grp{font-size:11px;color:#8a6a1f;margin:10px 0 6px;font-weight:700;display:flex;align-items:center;gap:6px}
  .grp:before{content:"";width:2px;height:12px;background:var(--gold)}
  .arc{background:#fbf9f4;border:1px solid var(--line2);border-radius:10px;padding:9px 11px;margin-bottom:7px}
  .arc .h{display:flex;gap:8px;align-items:baseline}
  .arc .at{font-weight:600;font-size:13px;flex:1}
  .arc .ad{font-size:10px;color:var(--sub)}
  .arc .ar{font-size:12px;color:var(--green);margin-top:4px}
  .arc .ar:before{content:"→ ";color:var(--sub)}
  .ct{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:10px 12px;margin-bottom:7px}
  .ct .cn{font-weight:700;font-size:14px}
  .ct .cr{font-size:11px;color:var(--green);margin-left:6px}
  .ct .co{font-size:11px;color:var(--sub);margin-top:2px}
  .ct .cnote{font-size:12px;color:var(--sub);margin-top:5px;line-height:1.5}
  .catb{font-size:10px;border-radius:6px;padding:1px 6px;border:1px solid var(--line2);color:var(--sub);background:#faf7f1;margin-left:auto}
  .empty{color:var(--sub);font-size:13px;padding:14px 4px}
  .foot{margin-top:34px;text-align:center;font-size:10.5px;color:#9aa39d}
  .toast{position:fixed;left:50%;bottom:20px;transform:translateX(-50%);background:var(--ink);color:#fff;padding:10px 16px;border-radius:10px;font-size:13px;z-index:50;box-shadow:0 6px 24px rgba(0,0,0,.18)}
</style>
</head>

          editId:null, qaText:"", qaPrio:"오늘", showArc:false, showCt:false };

function esc(s){ return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
function toSeoulDate(v){ var s=String(v==null?"":v); if(s==="") return ""; if(/^\d{4}-\d{2}-\d{2}$/.test(s)) return s; var d=new Date(s); if(isNaN(d.getTime())) return s; return new Intl.DateTimeFormat("en-CA",{timeZone:"Asia/Seoul",year:"numeric",month:"2-digit",day:"2-digit"}).format(d); }
function fmtDate(v){ var s=toSeoulDate(v); if(!s) return ""; return String(s).slice(5,10).replace("-","/"); }
function fmtTime(v){ var s=String(v==null?"":v); if(s==="") return ""; if(/^\d{1,2}:\d{2}/.test(s)) return s.slice(0,5); var d=new Date(s); if(isNaN(d.getTime())) return s; return new Intl.DateTimeFormat("en-GB",{timeZone:"Asia/Seoul",hour:"2-digit",minute:"2-digit",hour12:false}).format(d); }
function weekday(d){ return ["일","월","화","수","목","금","토"][d.getDay()]; }
function normTask(t){ t.isOwnerTask = (t.isOwnerTask===true || String(t.isOwnerTask).toUpperCase()==="TRUE"); return t; }

function apiGet(action){ return fetch(GAS_URL+"?action="+action).then(function(r){return r.json();}); }
function apiPost(p){ return fetch(GAS_URL,{method:"POST",body:JSON.stringify(p)}).then(function(r){return r.json();}); }

function flash(m){
  var t=document.createElement("div"); t.className="toast"; t.textContent=m;
  document.body.appendChild(t); setTimeout(function(){ if(t.parentNode) t.parentNode.removeChild(t); },2200);
}

function load(){
  if(!GAS_URL){ S.tasks=DEMO_TASKS.slice(); S.contacts=DEMO_CONTACTS.slice(); S.archive=[]; S.mode="demo"; render(); return; }
  Promise.all([apiGet("getTasks"),apiGet("getArchive"),apiGet("getContacts")]).then(function(res){
    S.tasks=(res[0].tasks||[]).map(normTask); S.archive=res[1].archive||[]; S.contacts=res[2].contacts||[]; S.mode="live"; render();
  }).catch(function(){
    S.tasks=DEMO_TASKS.slice(); S.contacts=DEMO_CONTACTS.slice(); S.archive=[]; S.mode="demo"; flash("연결 실패 — 데모 표시"); render();
  });
}

function setFilter(d){ S.filter = (S.filter===d ? "전체" : d); render(); }
function setQaPrio(p){ syncQa(); S.qaPrio=p; render(); }
function toggleArc(){ S.showArc=!S.showArc; render(); }
function toggleCt(){ S.showCt=!S.showCt; render(); }
function startEdit(id){ S.editId=id; render(); var el=document.getElementById("res_"+id); if(el) el.focus(); }
function cancelEdit(){ S.editId=null; render(); }
function syncQa(){ var el=document.getElementById("qaInput"); if(el) S.qaText=el.value; }

function quickAdd(){
  syncQa(); var text=(S.qaText||"").trim(); if(!text) return;
  var t={id:"Q"+Date.now(),title:text,domain:"이음컴퍼니",agent:"총괄비서",priority:S.qaPrio,dueDate:"",dueTime:"",nextAction:"",delegatedTo:"",isOwnerTask:true,source:"빠른메모"};
  if(S.mode==="live"){ apiPost({action:"appendTasks",_meta:{source:"빠른메모"},tasks:[t]}).catch(function(){flash("저장 실패");}); }
  S.tasks.push(t); S.qaText=""; flash("추가했습니다"); render();
}

function saveComplete(id){
  var t=null,i; for(i=0;i<S.tasks.length;i++){ if(S.tasks[i].id===id){ t=S.tasks[i]; break; } }
  if(!t) return;
  var el=document.getElementById("res_"+id); var result=el?el.value:"";
  function done(){
    S.archive.push({id:t.id,title:t.title,domain:t.domain,agent:t.agent,priority:t.priority,dueDate:t.dueDate,source:t.source,result:result,completedAt:"방금",originalNextAction:t.nextAction});
    S.tasks=S.tasks.filter(function(x){return x.id!==id;}); S.editId=null; flash("완료보관함으로 이동했습니다"); render();
  }
  if(S.mode==="live"){ apiPost({action:"completeTask",id:id,result:result}).then(function(r){ if(r&&r.ok) done(); else flash("저장 실패 — 다시 시도"); }).catch(function(){flash("저장 실패 — 다시 시도");}); }
  else { done(); }
}

function seed(){
  if(S.mode!=="live"){ flash("먼저 연결하세요"); return; }
  flash("시트에 넣는 중…");
  apiPost({action:"appendTasks",_meta:{source:"본사미팅_0617"},tasks:DEMO_TASKS,contacts:DEMO_CONTACTS})
    .then(function(){ flash("14건·연락처 6명 넣었습니다"); load(); })
    .catch(function(){ flash("실패 — 다시 시도"); });
}

function taskCard(t){
  var k=(PRIO[t.priority]||{k:"a"}).k;
  var h='<div class="card '+k+'">';
  h+='<div class="ctop"><div class="ttl">'+(DOMAINS[t.domain]?DOMAINS[t.domain].e+" ":"")+esc(t.title)+'</div><span class="agent">'+esc(t.agent)+'</span></div>';
  if(t.nextAction) h+='<div class="na">'+esc(t.nextAction)+'</div>';
  h+='<div class="meta">';
  if(t.dueDate) h+='<span class="tag due">'+fmtDate(t.dueDate)+(t.dueTime?" "+fmtTime(t.dueTime):"")+'</span>';
  if(t.isOwnerTask) h+='<span class="tag own">직접</span>';
  if(t.delegatedTo) h+='<span class="tag dele">→'+esc(t.delegatedTo)+'</span>';
  if(t.source) h+='<span class="src mono">'+esc(t.source)+'</span>';
  h+='</div>';
  if(S.editId===t.id){
    h+='<div class="editor"><textarea id="res_'+t.id+'" placeholder="어떻게 끝났는지 한 줄 — 예) 정진아 원장 10월 종료 수긍"></textarea>';
    h+='<div class="erow"><button class="save" onclick="saveComplete(\''+t.id+'\')">완료 저장</button><button class="cancel" onclick="cancelEdit()">취소</button></div></div>';
  } else {
    h+='<button class="done" onclick="startEdit(\''+t.id+'\')">완료</button>';
  }
  h+='</div>'; return h;
}

function render(){
  var d=new Date();
  var dateLabel=d.getFullYear()+"."+String(d.getMonth()+1).padStart(2,"0")+"."+String(d.getDate()).padStart(2,"0")+" "+weekday(d);
  var visible=S.tasks.filter(function(t){return S.filter==="전체"||t.domain===S.filter;});
  var cal=S.tasks.filter(function(t){return t.dueDate;}).sort(function(a,b){return String(a.dueDate).localeCompare(b.dueDate);});
  var counts={}; S.tasks.forEach(function(t){counts[t.domain]=(counts[t.domain]||0)+1;});

  var h='<div class="wrap">';
  h+='<div class="top"><div class="row"><div class="brand">조현 <span class="dot">·</span> 비서실</div><div class="date mono">'+dateLabel+'</div></div>';
  h+='<div class="statusline">';
  if(S.mode==="live") h+='<span class="pill live">● 시트 연동</span>';
  else if(S.mode==="demo") h+='<span class="pill demo">● 데모 미리보기</span>';
  else h+='<span class="pill">불러오는 중…</span>';
  h+='<span>할일 '+S.tasks.length+'</span><button class="refresh" onclick="load()">새로고침</button></div></div>';

  h+='<div class="quick"><input id="qaInput" value="'+esc(S.qaText)+'" oninput="S.qaText=this.value" onkeydown="if(event.key===\'Enter\')quickAdd()" placeholder="빠른 메모 — 떠오른 일을 적어 바로 담기"><button onclick="quickAdd()">담기</button></div>';
  h+='<div class="prio-toggle">';
  PRIO_ORDER.forEach(function(p){ h+='<button data-on="'+(S.qaPrio===p?1:0)+'" onclick="setQaPrio(\''+p+'\')">'+p+'</button>'; });
  h+='</div>';

  h+='<div class="chips"><button class="chip" data-on="'+(S.filter==="전체"?1:0)+'" onclick="setFilter(\'전체\')">전체<span class="n">'+S.tasks.length+'</span></button>';
  Object.keys(DOMAINS).forEach(function(dn){
    var label=dn.replace("대한미용사회광주북구지회","미용사회").replace("호남라이온스클럽","라이온스").replace("개인인프라","개인");
    h+='<button class="chip" data-on="'+(S.filter===dn?1:0)+'" onclick="setFilter(\''+dn+'\')">'+DOMAINS[dn].e+" "+label+(counts[dn]?'<span class="n">'+counts[dn]+'</span>':"")+'</button>';
  });
  h+='</div>';

  if(S.mode==="live" && S.tasks.length===0){
    h+='<div class="cal" style="background:#eef5f1;border-color:#cfe3da"><h3 style="color:#1c5c4a">🌱 처음 한 번만</h3><div class="note" style="color:#3d5b50;margin-top:0;margin-bottom:8px">시트가 비어 있습니다. 본사미팅(0617) 할일 14건과 연락처 6명을 넣어 시작하세요.</div><button class="done" style="margin-top:0" onclick="seed()">14건·연락처 6명 시트에 넣기</button></div>';
  }

  if(cal.length>0){
    h+='<div class="cal"><h3>📅 캘린더 대기 <span style="font-weight:500;color:#a98a3f">· 날짜 잡힌 일 '+cal.length+'건</span></h3>';
    cal.forEach(function(t){ h+='<div class="it"><div class="d mono">'+fmtDate(t.dueDate)+(t.dueTime?" "+fmtTime(t.dueTime):"")+'</div><div class="tt">'+esc(t.title)+'</div></div>'; });
    h+='<div class="note">3단계 캘린더 연동 때 이 목록이 그대로 일정으로 들어갑니다.</div></div>';
  }

  PRIO_ORDER.forEach(function(p){
    var items=visible.filter(function(t){return t.priority===p;});
    if(items.length===0) return;
    h+='<div class="sec"><span class="bar '+PRIO[p].k+'"></span><h2>'+p+'</h2><span class="cnt">'+items.length+'건</span></div>';
    items.forEach(function(t){ h+=taskCard(t); });
  });
  if(visible.length===0) h+='<div class="empty">표시할 할일이 없습니다.</div>';

  h+='<div class="fold"><button onclick="toggleArc()">✅ 완료보관함 <span class="cnt">'+S.archive.length+'건</span><span class="arr">'+(S.showArc?"▲":"▼")+'</span></button>';
  if(S.showArc){
    if(S.archive.length===0){ h+='<div class="empty">아직 완료한 일이 없습니다. 할일에서 완료하면 출처별로 여기에 쌓입니다.</div>'; }
    else {
      var groups={}; S.archive.forEach(function(a){ (groups[a.source]=groups[a.source]||[]).push(a); });
      Object.keys(groups).forEach(function(src){
        h+='<div class="grp mono">'+esc(src)+'</div>';
        groups[src].forEach(function(a){
          h+='<div class="arc"><div class="h"><div class="at">'+(DOMAINS[a.domain]?DOMAINS[a.domain].e+" ":"")+esc(a.title)+'</div><div class="ad mono">'+esc(a.completedAt)+'</div></div>';
          if(a.result) h+='<div class="ar">'+esc(a.result)+'</div>';
          h+='</div>';
        });
      });
    }
  }
  h+='</div>';

  h+='<div class="fold"><button onclick="toggleCt()">👥 연락처허브 <span class="cnt">'+S.contacts.length+'명</span><span class="arr">'+(S.showCt?"▲":"▼")+'</span></button>';
  if(S.showCt){
    if(S.contacts.length===0){ h+='<div class="empty">연락처가 없습니다.</div>'; }
    else { S.contacts.forEach(function(c){
      h+='<div class="ct"><div style="display:flex;align-items:baseline"><span class="cn">'+esc(c.name)+'</span><span class="cr">'+esc(c.role)+'</span><span class="catb">'+esc(c.category)+'</span></div><div class="co">'+esc(c.org)+'</div>';
      if(c.note) h+='<div class="cnote">'+esc(c.note)+'</div>';
      h+='</div>';
    }); }
  }
  h+='</div>';

  h+='<div class="foot">조현 비서실 · 구글시트 연동(GAS) · 메인 허브</div>';
  h+='</div>';

  document.getElementById("root").innerHTML=h;
}

render();
load();
</script>
</body>
</html>
